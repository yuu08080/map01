<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東葛エリア ラーメン空間分析マップ</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>

    <!-- 現在地ボタン（手動再取得） -->
    <button id="locate-btn" class="locate-btn" title="現在地を再取得" aria-label="現在地を再取得">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="8"/>
            <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>
            <line x1="12" y1="2"  x2="12" y2="6"/>
            <line x1="12" y1="18" x2="12" y2="22"/>
            <line x1="2"  y1="12" x2="6"  y2="12"/>
            <line x1="18" y1="12" x2="22" y2="12"/>
        </svg>
    </button>

    <!-- タイトルパネル（左上） -->
    <div class="info-panel">
        <h2>柏市周辺のラーメン店マップ</h2>
        <p><span class="shop-count">対象: 柏市・松戸市・流山市・我孫子市</span></p>
        <p style="margin-top:8px; font-size:11px; color:#999;">ピンをクリックで詳細・自動ズーム</p>
        <p class="update-date">データ最終更新日：2026年5月</p>
    </div>

    <!-- 最寄りラーメン検索パネル（左下） -->
    <div class="nearest-panel" id="nearestPanel">
        <div class="nearest-header">📍 最寄りラーメン検索</div>
        <div class="nearest-tabs">
            <button class="nearest-tab active" data-mode="car">🚗&nbsp;車</button>
            <button class="nearest-tab"        data-mode="walk">🚶&nbsp;徒歩</button>
            <button class="nearest-tab"        data-mode="train">🚃&nbsp;電車</button>
        </div>
        <div class="nearest-result" id="nearestResult">
            <p class="nearest-loading">現在地を取得中…</p>
        </div>
    </div>

    <!-- 凡例（右下） -->
    <div class="legend">
        <div class="legend-item">
            <img class="legend-pin" src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-grey.png">
            <span style="font-size:12px; color:#333;">駅</span>
        </div>
        <div class="legend-item">
            <img class="legend-pin" src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png">
            <span style="font-size:12px; color:#333;">個人店</span>
        </div>
        <div class="legend-item">
            <img class="legend-pin" src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png">
            <span style="font-size:12px; color:#333;">チェーン店</span>
        </div>
        <div class="legend-item"><div class="legend-line" style="background:#3498db;"></div><span style="font-size:12px; color:#333;">国道6号</span></div>
        <div class="legend-item"><div class="legend-line" style="background:#e67e22;"></div><span style="font-size:12px; color:#333;">国道16号</span></div>
        <div class="legend-item"><div class="legend-line" style="background:#9b59b6;"></div><span style="font-size:12px; color:#333;">流山街道</span></div>
        <div class="legend-item"><div class="legend-line" style="background:#e84393;"></div><span style="font-size:12px; color:#333;">国道464号</span></div>
        <div class="legend-item"><div class="legend-line" style="background:#27ae60;"></div><span style="font-size:12px; color:#333;">国道294号</span></div>
    </div>

    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
